<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>formulario</title>
</head>
<body>
    <article>
        <h1>Formulario Basico</h1>
        <form action="/" method="post">
            
            <div>
                <label for="nombre">Nombre:</label><br>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <br>
            <div>
                <label for="apellido">Apellido:</label><br>
                <input type="text" id="apellido" name="apellido" required>
            </div>
            <br>
            <div>
                <label for="usuario">Nombre de usuario:</label><br>
                <input type="text" id="usuario" name="usuario" required minlength="5">
            </div>
            <br>
            Correo
            <div>
                <label for="correo">Correo electrónico:</label><br>
                <input type="email" id="correo" name="correo" required>
            </div>
            <br>
            <div>
                <label for="password">Contraseña:</label><br>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            <br>
            <div>
                <label for="pais">País:</label><br>
                <select id="pais" name="pais" required>
                    <option value="">Seleccione su país</option>
                    <option value="argentina">Argentina</option>
                    <option value="bolivia">Bolivia</option>
                    <option value="brasil">Brasil</option>
                    <option value="chile">Chile</option>
                    <option value="colombia">Colombia</option>
                    <option value="costa_rica">Costa Rica</option>
                    <option value="cuba">Cuba</option>
                    <option value="ecuador">Ecuador</option>
                    <option value="el_salvador">El Salvador</option>
                    <option value="guatemala">Guatemala</option>
                    <option value="haiti">Haití</option>
                    <option value="honduras">Honduras</option>
                    <option value="mexico">México</option>
                    <option value="nicaragua">Nicaragua</option>
                    <option value="panama">Panamá</option>
                    <option value="paraguay">Paraguay</option>
                    <option value="peru">Perú</option>
                    <option value="puerto_rico">Puerto Rico</option>
                    <option value="republica_dominicana">República Dominicana</option>
                    <option value="uruguay">Uruguay</option>
                    <option value="venezuela">Venezuela</option>
                    <option value="usa">Estados Unidos</option>
                    <option value="canada">Canadá</option>
                </select>
            </div>
            <br>
            <div>
                <label for="telefono">Número de teléfono:</label><br>
                <input type="tel" id="telefono" name="telefono" 
                    placeholder="+58 123456789" required>
            </div>
            <br>
            <div>
                <label>Género:</label><br>
                <input type="radio" id="masculino" name="genero" value="masculino" required>
                <label for="masculino">Masculino</label><br>
                <input type="radio" id="femenino" name="genero" value="femenino">
                <label for="femenino">Femenino</label><br>
                <input type="radio" id="otro" name="genero" value="otro">
                <label for="otro">Otro</label>
            </div>
            <br>
            <div>
                <input type="checkbox" id="terminos" name="terminos" required>
                <label for="terminos">Acepto los términos de privacidad</label>
            </div>
            <br>
            <div>
                <input type="submit" value="Registrarse">
            </div>
        </form>
    </article>
</body>
</html>
